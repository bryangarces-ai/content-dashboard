<nav *ngIf="pagination && pagination.totalPages > 1" aria-label="Page navigation">
  <ul class="pagination justify-content-center">
    <li class="page-item" [class.disabled]="pagination.page <= 1">
      <button class="page-link" (click)="goTo(pagination.page - 1)" type="button">Previous</button>
    </li>
    <li class="page-item" *ngFor="let p of pages" [class.active]="p === pagination.page">
      <button class="page-link" (click)="goTo(p)" type="button">{{ p }}</button>
    </li>
    <li class="page-item" [class.disabled]="pagination.page >= pagination.totalPages">
      <button class="page-link" (click)="goTo(pagination.page + 1)" type="button">Next</button>
    </li>
  </ul>
</nav>
